syntax = "proto3";

package mlx_container.v1;

option swift_prefix = "MLXContainer_";

// MLX Container Service — GPU inference bridge for Linux containers on Apple Silicon.
// Runs on the macOS host, accepts requests from guest VMs over vsock.
service MLXContainerService {
  // Model management
  rpc LoadModel(LoadModelRequest) returns (LoadModelResponse);
  rpc UnloadModel(UnloadModelRequest) returns (UnloadModelResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);

  // Inference
  rpc Generate(GenerateRequest) returns (stream GenerateResponse);
  rpc Embed(EmbedRequest) returns (EmbedResponse);

  // Health & status
  rpc GetGPUStatus(GetGPUStatusRequest) returns (GetGPUStatusResponse);
  rpc Ping(PingRequest) returns (PingResponse);
}

// ============================================================================
// Model Management
// ============================================================================

message LoadModelRequest {
  // HuggingFace model ID (e.g. "mlx-community/Llama-3.2-1B-4bit")
  string model_id = 1;
  // Optional alias for the model
  string alias = 2;
  // GPU memory budget for this model in bytes (0 = auto)
  uint64 memory_budget_bytes = 3;
}

message LoadModelResponse {
  bool success = 1;
  string model_id = 2;
  string error = 3;
  uint64 memory_used_bytes = 4;
  double load_time_seconds = 5;
}

message UnloadModelRequest {
  string model_id = 1;
}

message UnloadModelResponse {
  bool success = 1;
  string error = 2;
  uint64 memory_freed_bytes = 3;
}

message ListModelsRequest {}

message ListModelsResponse {
  repeated ModelInfo models = 1;
}

message ModelInfo {
  string model_id = 1;
  string alias = 2;
  uint64 memory_used_bytes = 3;
  bool is_loaded = 4;
  string model_type = 5;  // "llm", "vlm", etc.
}

// ============================================================================
// Inference
// ============================================================================

message GenerateRequest {
  string model_id = 1;
  string prompt = 2;
  repeated ChatMessage messages = 3;
  GenerateParameters parameters = 4;
  string container_id = 5;
}

message ChatMessage {
  string role = 1;    // "system", "user", "assistant"
  string content = 2;
}

message GenerateParameters {
  int32 max_tokens = 1;
  float temperature = 2;
  float top_p = 3;
  float repetition_penalty = 4;
  int32 repetition_context_size = 5;
}

message GenerateResponse {
  oneof response {
    string token = 1;             // Streaming token
    GenerateComplete complete = 2; // Final response with stats
  }
}

message GenerateComplete {
  string full_text = 1;
  int32 prompt_tokens = 2;
  int32 completion_tokens = 3;
  double prompt_time_seconds = 4;
  double generation_time_seconds = 5;
  double tokens_per_second = 6;
}

message EmbedRequest {
  string model_id = 1;
  repeated string texts = 2;
  string container_id = 3;
}

message EmbedResponse {
  repeated Embedding embeddings = 1;
  string error = 2;
}

message Embedding {
  repeated float values = 1;
}

// ============================================================================
// Health & Status
// ============================================================================

message GetGPUStatusRequest {}

message GetGPUStatusResponse {
  string device_name = 1;
  uint64 total_memory_bytes = 2;
  uint64 used_memory_bytes = 3;
  uint64 available_memory_bytes = 4;
  string gpu_family = 5;
  int32 loaded_models_count = 6;
  repeated ModelInfo loaded_models = 7;
}

message PingRequest {}

message PingResponse {
  string status = 1;   // "ok"
  string version = 2;
  double uptime_seconds = 3;
}
